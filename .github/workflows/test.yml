name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  bdd-tests:
    name: BDD / keyword-driven tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          # setup-python's pip cache looks for **/requirements.txt or
          # **/pyproject.toml by default to build its cache key; this
          # repo has neither at the root (only requirements-test.txt),
          # so without this it can't find anything to key the cache on
          # and prints a warning (harmless, but pointless without this).
          cache-dependency-path: requirements-test.txt

      - name: Install requirements (integration + test, together)
        # thinqconnect and homeassistant have to be installed in the
        # SAME pip invocation, not two separate ones: pip's resolver
        # only sees the constraints given in a single call. Installed
        # separately, whichever runs second silently overrides a shared
        # dependency the first one needs (concretely: homeassistant
        # pins aiohttp==3.11.11, while newer thinqconnect releases
        # require aiohttp>=3.14.0 - installed apart, the second install
        # just downgrades/upgrades aiohttp under the first one's feet).
        # Installed together, pip's resolver finds a thinqconnect
        # version whose own aiohttp requirement is actually compatible
        # with homeassistant's pin (currently resolves to
        # thinqconnect==1.0.12) instead of silently producing a broken
        # environment. Reads requirements straight out of manifest.json
        # (via a real script file, not an inline heredoc - a heredoc
        # written inside an indented YAML block carries that indentation
        # into the Python source itself and fails with IndentationError)
        # so this step can never silently drift out of sync with what
        # the integration actually declares it needs.
        run: |
          python -m pip install --upgrade pip
          python .github/scripts/print_manifest_requirements.py > requirements-manifest.txt
          cat requirements-manifest.txt
          pip install -r requirements-manifest.txt -r requirements-test.txt

      - name: Run BDD / keyword-driven test suite
        # Never let a test failure stop the workflow here - the report
        # steps below (which run unconditionally via `if: always()`)
        # need to run either way so failures are visible, not just
        # silently red in the raw log.
        run: python -m pytest tests/ -v --junitxml=test-results.xml
        continue-on-error: true
        id: pytest

      - name: Write results to the workflow run summary
        # Always runs (pass or fail) and needs no extra permissions or
        # third-party action, so this is the one reporting step
        # guaranteed to show results even if the check-run step below
        # can't (e.g. restricted GITHUB_TOKEN on a fork PR).
        if: always()
        run: python .github/scripts/write_test_summary.py test-results.xml "Python 3.12"

      - name: Publish test results as a check run
        # Adds pass/fail annotations directly on the commit/PR (richer
        # than the plain-text summary above), but needs checks:write -
        # kept as a best-effort addition, not the only reporting path.
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: BDD tests
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Fail the job if tests failed
        # The pytest step above deliberately continues past a test
        # failure so the reporting steps still run; this is what
        # actually turns the job red for a failing test suite.
        if: steps.pytest.outcome == 'failure'
        run: exit 1

      - name: Publish raw JUnit XML as an artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  lint-import-check:
    name: Import sanity check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install requirements (integration + homeassistant, together)
        # See the matching step in the bdd-tests job for why this must
        # be one pip invocation, not two.
        run: |
          python -m pip install --upgrade pip
          python .github/scripts/print_manifest_requirements.py > requirements-manifest.txt
          cat requirements-manifest.txt
          pip install -r requirements-manifest.txt "homeassistant>=2024.9.0"

      - name: Byte-compile every module (catches syntax errors early)
        run: python -m py_compile $(find custom_components/my_lg -name "*.py")

      - name: Import every platform module
        working-directory: custom_components
        run: python ../.github/scripts/check_imports.py
